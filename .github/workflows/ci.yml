name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: web-tools
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run linters
        run: pnpm lint

      - name: Run unit test
        run: pnpm test

      - name: Type check
        run: pnpm typecheck

      # The production build is validated by the e2e workflow, which builds the
      # app in each shard before running Playwright (same triggers: PR + push to
      # main). Keeping it out of `ci` keeps this job a fast lint/unit/typecheck
      # gate; a build break still fails the e2e jobs on every PR.
