about:
  content: >
    # Sobre Web Tools

    Este sitio es un fork de [it-tools](https://github.com/CorentinTh/it-tools) por [Corentin Thomasset](https://corentin.tech) y agrega herramientas útiles para desarrolladores y personas que trabajan en IT.

    Web Tools es de código abierto (bajo la licencia GPL-3.0) y gratuito.

    ## Tecnologías

    Web Tools está creado en Vue.js (Vue 3) con la biblioteca de componentes Naive UI. En algunas herramientas se utilizan bibliotecas de código abierto de terceros; puede encontrar la lista completa en [package.json](https://github.com/acaylor/web-tools/blob/main/package.json) del repositorio.

    ## ¿Encontraste un error? ¿Falta una herramienta?

    Si necesita una herramienta que actualmente no está presente aquí, puede enviar una solicitud en el [issues section](https://github.com/acaylor/web-tools/issues/new) del repositorio de GitHub.

    Si encontró un error, presente un reporte en el [issues section](https://github.com/acaylor/web-tools/issues/new) del repositorio de GitHub.

