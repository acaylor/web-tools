about:
  content: >
    # Sobre o Web Tools

    Este site é um fork de [it-tools](https://github.com/CorentinTh/it-tools) por [Corentin Thomasset](https://corentin.tech) e junta ferramentas úteis para desenvolvedores e outras pessoas que trabalham com TI.

    O Web Tools é código aberto (sob a licença GPL-3.0) e gratuito.

    ## Tecnologias

    O Web Tools é feito em Vue.js (Vue 3) com a biblioteca de componentes Naive UI. Bibliotecas de código aberto de terceiros são usadas em algumas ferramentas e você pode encontrar a lista completa no arquivo [package.json](https://github.com/acaylor/web-tools/blob/main/package.json) do repositório.

    ## Achou um bug? Está faltando uma ferramenta?

    Se você precisa de uma ferramenta que ainda não existe aqui, seu pedido será bem vindo na [seção de issues](https://github.com/acaylor/web-tools/issues/new) no repositório do GitHub.

    Se você encontrar um bug, por favor registre um relato na [seção de issues](https://github.com/acaylor/web-tools/issues/new) no GitHub.

