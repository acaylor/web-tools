about:
  content: >
    # Про Web Tools

    Цей вебсайт є форком [it-tools](https://github.com/CorentinTh/it-tools) від [Corentin Thomasset](https://corentin.tech) і агрегує корисні інструменти для розробників і людей, які працюють в сфері IT.

    Web Tools є відкритим програмним забезпеченням (під ліцензією GPL-3.0) і безкоштовним.

    ## Технології

    Web Tools виконаний на Vue.js (Vue 3) з використанням бібліотеки компонентів Naive UI. У деяких інструментах використовуються сторонні відкриті бібліотеки, повний список яких ви можете знайти в файлі [package.json](https://github.com/acaylor/web-tools/blob/main/package.json) репозиторію.

    ## Знайшли баг? Відсутній інструмент?

    Якщо вам потрібен інструмент, якого наразі немає тут, ви можете подати запит в [розділі проблем](https://github.com/acaylor/web-tools/issues/new) у репозиторії GitHub.

    Якщо ви знайшли баг, будь ласка, подайте звіт в [розділі проблем](https://github.com/acaylor/web-tools/issues/new) у репозиторії GitHub.

