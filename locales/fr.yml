about:
  content: >
    # À propos de Web Tools

    Ce site est un fork de [it-tools](https://github.com/CorentinTh/it-tools) par [Corentin Thomasset](https://corentin.tech) et regroupe des outils utiles pour les développeurs et les personnes travaillant dans l'informatique.

    Web Tools est open-source (sous licence GPL-3.0) et gratuit.

    ## Technologies

    Web Tools est fait en Vue.js (Vue 3) avec la bibliothèque de composants Naive UI. Des bibliothèques open-source tierces sont utilisées dans certains outils, vous pouvez trouver la liste complète dans le fichier [package.json](https://github.com/acaylor/web-tools/blob/main/package.json) du dépôt.

    ## Vous avez trouvé un bug ? Un outil manque ?

    Si vous avez besoin d'un outil qui n'est pas encore présent ici, vous êtes invité à soumettre une demande dans la [section issue](https://github.com/acaylor/web-tools/issues/new) du dépôt GitHub.

    Si vous avez trouvé un bug, veuillez soumettre un rapport dans la [section issue](https://github.com/acaylor/web-tools/issues/new) du dépôt GitHub.

